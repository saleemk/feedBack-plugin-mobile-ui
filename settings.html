<style>
  .mobile-ui-settings-panel { padding: 0; }
  .mobile-ui-settings-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 0.75rem; cursor: pointer;
  }
  .mobile-ui-settings-label {
    font-size: 0.88rem; font-weight: 500; color: #cbd5e1;
  }
  .mobile-ui-settings-toggle {
    width: 2.6rem; height: 1.5rem; accent-color: #22d3ee;
    cursor: pointer; flex: 0 0 auto;
  }
  .mobile-ui-settings-help {
    margin: 0.5rem 0 0; font-size: 0.75rem; color: #64748b;
    line-height: 1.4;
  }
</style>

<div class="mobile-ui-settings-panel">
  <label class="mobile-ui-settings-row">
    <span class="mobile-ui-settings-label">Enable mobile UI enhancements</span>
    <input type="checkbox" class="mobile-ui-settings-toggle" id="mobile-ui-toggle">
  </label>
  <p class="mobile-ui-settings-help">
    Applies phone and tablet layout improvements to the player, library, and other
    screens. Disabling hides mobile-specific styling without unloading the plugin.
  </p>

  <label class="mobile-ui-settings-row" style="margin-top:1rem;">
    <span class="mobile-ui-settings-label">Pause song when opening More controls</span>
    <input type="checkbox" class="mobile-ui-settings-toggle" id="mobile-ui-pause-toggle">
  </label>
  <p class="mobile-ui-settings-help">
    Pauses playback when you open the mobile More controls shelf.
    Playback will not resume automatically when you close the shelf.
  </p>
</div>

<script>
(function () {
  'use strict';

  var PAUSE_KEY = 'mobile_ui.pauseOnMoreOpen';
  var installed = false;

  function readFlag(key) {
    try { return window.localStorage.getItem(key) === '1'; } catch (_) { return false; }
  }
  function writeFlag(key, val) {
    try { if (val) window.localStorage.setItem(key, '1'); else window.localStorage.removeItem(key); } catch (_) {}
  }

  function init() {
    var toggle = document.getElementById('mobile-ui-toggle');
    var pauseToggle = document.getElementById('mobile-ui-pause-toggle');
    var api = window.__feedBackMobileUi;

    if (toggle && pauseToggle && api && api.isDisabled && api.enable && api.disable) {
      if (installed) {
        toggle.checked = !api.isDisabled();
        pauseToggle.checked = readFlag(PAUSE_KEY);
        return;
      }
      installed = true;
      toggle.checked = !api.isDisabled();
      pauseToggle.checked = readFlag(PAUSE_KEY);

      toggle.addEventListener('change', function () {
        if (toggle.checked) { api.enable(); } else { api.disable(); }
        setTimeout(function () { toggle.checked = !api.isDisabled(); }, 100);
      });

      pauseToggle.addEventListener('change', function () {
        writeFlag(PAUSE_KEY, pauseToggle.checked);
      });
    } else {
      setTimeout(init, 200);
    }
  }

  init();
})();
</script>
